services:
  # Service vLLM : Moteur d'inférence GPU NVIDIA
  vllm:
    image: vllm/vllm-openai:gemma-x86_64-cu130
    container_name: promethaiius-vllm
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ${MODELS_DIR}:/models
      - hf_cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - VLLM_USE_V2_MODEL_RUNNER=1
    entrypoint: ["vllm"]
    command: >
      serve nvidia/diffusiongemma-26B-A4B-it-NVFP4
      --host 0.0.0.0
      --port 8000
      --trust-remote-code
      --dtype auto
      --max-model-len 65000
      --gpu-memory-utilization 0.65
      --max-num-batched-tokens 4096
      --max-num-seqs 2
      --diffusion-config '{"canvas_length": 128, "max_denoising_steps": 32}'
      --attention-backend FLASH_ATTENTION
      --enable-auto-tool-choice
      --tool-call-parser gemma4
      --reasoning-parser gemma4
      --override-generation-config '{"max_new_tokens": null}'
      --default-chat-template-kwargs '{"enable_thinking": true}'
      -tp 1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  # Service Hermes : "God Container" (Agent + CLIs)
  hermes:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    container_name: promethaiius-hermes
    restart: unless-stopped
    depends_on:
      vllm:
        condition: service_healthy
    volumes:
      - ./hermes_data:/root/.hermes
      - ./workspace:/workspace
      - ${MODELS_DIR}:/models:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE_DIR=${WORKSPACE_DIR}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    # Hermes n'a pas besoin d'accès direct au GPU, il delegate au conteneur vllm

volumes:
  hf_cache: